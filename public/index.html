<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somador</title>
</head>
<body>
    <h1>Somador de Números</h1>
    <!-- O segredo está no target="janela" -->
    <form action="/somar" method="GET" target="janela">
        <label for="salario">Digite o salário:</label>
        <input type="number" id="salario" name="salario" step="0.01" required><br><br>
        <button type="submit">Executar</button>
    </form>

    <hr>
    <h3>Resultado:</h3>
    <!-- O iframe recebe a resposta do servidor -->
    <iframe name="janela"></iframe>
</body>
</html>
